name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:          # allows manual trigger from GitHub Actions UI

jobs:

  sync-to-ai-music-supervisor:
    name: Sync → ai-music-supervisor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF Space (ai-music-supervisor)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force \
            https://bohem001:$HF_TOKEN@huggingface.co/spaces/bohem001/ai-music-supervisor \
            main

